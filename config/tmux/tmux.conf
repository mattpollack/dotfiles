# Tmux Configuration (Quick-setup / TPM entry point)
# Used by quick-setup.sh on macOS.
# Nix manages plugins via programs.tmux.plugins and reads tmux-base.conf directly.

# ============================================================================
# Plugin Manager
# ============================================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

# ============================================================================
# Base Settings
# ============================================================================
source ~/.config/tmux/tmux-base.conf

# ============================================================================
# Plugin Keybindings (TPM paths)
# ============================================================================
unbind w
unbind s
bind-key w run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/window.sh switch"
bind-key s run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh switch"

# ============================================================================
# Initialize TPM (keep this line at the very bottom)
# ============================================================================
run '~/.config/tmux/plugins/tpm/tpm'

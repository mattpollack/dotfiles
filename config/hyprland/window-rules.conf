# Window Rules Configuration for Hyprland

# Picture-in-Picture windows (sticky and floating)
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = keep_aspect_ratio on, match:title ^(Picture-in-Picture)$

# Floating windows
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(1password)$
windowrule = float on, match:class ^(com.1password.1Password)$

# File picker dialogs
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save File)$
windowrule = float on, match:title ^(Open Folder)$

# Opacity rules (optional, can be customized)
# windowrule = opacity 0.9 0.7, match:class ^(wezterm)$
# windowrule = opacity 0.95 0.85, match:class ^(code)$

# Workspace assignment examples (customize as needed)
# windowrule = workspace 2, match:class ^(firefox)$
# windowrule = workspace 3, match:class ^(discord)$
# windowrule = workspace 4, match:class ^(code)$

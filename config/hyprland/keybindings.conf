# Keybindings Configuration for Hyprland
# Preserving your existing Qtile keybindings

$mainMod = SUPER  # Super/Windows key (Mod4)
$secondMod = ALT  # Super/Windows key (Mod4)

###################
### CORE ACTIONS ###
###################

# Terminal
bind = $mainMod, Return, exec, wezterm

# Launcher (using noctalia-shell launcher)
bind = $mainMod, space, exec, noctalia-shell ipc call launcher toggle
bind = $mainMod, d, exec, noctalia-shell ipc call launcher toggle

# Kill focused window
bind = $mainMod, q, killactive

# Reload Hyprland config
bind = $mainMod CTRL, r, exec, hyprctl reload
bind = $mainMod SHIFT, c, exec, hyprctl reload

# Exit Hyprland
bind = $mainMod SHIFT, e, exit

####################
### WINDOW FOCUS ###
####################

# Vim-style navigation (your existing keybindings)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Arrow key navigation (alternative)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#####################
### WINDOW MOVEMENT ###
#####################

# Vim-style window movement
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Arrow key window movement (alternative)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

###########################
### WINDOW RESIZE MODE ###
###########################

# Resize windows (using Alt+Ctrl, similar to your Sway config)
bind = ALT CTRL, h, resizeactive, -40 0
bind = ALT CTRL, l, resizeactive, 40 0
bind = ALT CTRL, k, resizeactive, 0 -40
bind = ALT CTRL, j, resizeactive, 0 40

######################
### WINDOW STATES ###
######################

# Fullscreen toggle
bind = $mainMod, f, fullscreen, 0

# Floating toggle
bind = $mainMod, t, togglefloating
bind = $mainMod SHIFT, space, togglefloating

# Focus parent (similar to Sway)
bind = $mainMod, a, changegroupactive

# Layout toggles
bind = $mainMod, e, layoutmsg, togglesplit

####################
### WORKSPACES ###
####################

# Switch workspaces (1-9)
bind = $secondMod, 1, workspace, 1
bind = $secondMod, 2, workspace, 2
bind = $secondMod, 3, workspace, 3
bind = $secondMod, 4, workspace, 4
bind = $secondMod, 5, workspace, 5
bind = $secondMod, 6, workspace, 6
bind = $secondMod, 7, workspace, 7
bind = $secondMod, 8, workspace, 8
bind = $secondMod, 9, workspace, 9
bind = $secondMod, 0, workspace, 10

# Move window to workspace (and follow)
bind = $secondMod SHIFT, 1, movetoworkspace, 1
bind = $secondMod SHIFT, 2, movetoworkspace, 2
bind = $secondMod SHIFT, 3, movetoworkspace, 3
bind = $secondMod SHIFT, 4, movetoworkspace, 4
bind = $secondMod SHIFT, 5, movetoworkspace, 5
bind = $secondMod SHIFT, 6, movetoworkspace, 6
bind = $secondMod SHIFT, 7, movetoworkspace, 7
bind = $secondMod SHIFT, 8, movetoworkspace, 8
bind = $secondMod SHIFT, 9, movetoworkspace, 9
bind = $secondMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scratchpad (similar to Sway's scratchpad)
bind = $mainMod SHIFT, minus, movetoworkspacesilent, special
bind = $mainMod, minus, togglespecialworkspace

###################
### SCREENSHOTS ###
###################

# Using hyprshot (similar to flameshot)
# Full screen screenshot
bind = $mainMod SHIFT, 3, exec, hyprshot -m output --clipboard-only

# Area selection screenshot
bind = $mainMod SHIFT, 4, exec, hyprshot -m region --clipboard-only

# Window screenshot (bonus - not in original config)
bind = $mainMod SHIFT, 5, exec, hyprshot -m window --clipboard-only

##################
### MOUSE BINDS ###
##################

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#####################
### MEDIA CONTROLS ###
#####################

# Volume control (using pamixer)
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Media playback control (using playerctl)
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

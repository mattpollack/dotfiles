# Hyprland Configuration
# https://wiki.hyprland.org/Configuring/

source = ~/.config/hypr/mocha.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,3840x2160@120,auto,1.5


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

# Session type for proper input device access
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# Scaling for HiDPI displays
env = GDK_SCALE,1.5
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,rose-pine-hyprcursor


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 4

    border_size = 1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $blueAlphae6
    col.inactive_border = $surface0Alphae6

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 4
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 6
        passes = 2

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 0.3, default
    animation = border, 1, 0.2, easeOutQuint
    animation = windows, 1, 0.2, easeOutQuint
    animation = windowsIn, 1, 0.2, easeOutQuint, popin 87%
    animation = windowsOut, 1, 0.15, linear, popin 87%
    animation = fadeIn, 1, 0.15, almostLinear
    animation = fadeOut, 1, 0.15, almostLinear
    animation = fade, 1, 0.2, quick
    animation = layers, 1, 0.2, easeOutQuint
    animation = layersIn, 1, 0.2, easeOutQuint, fade
    animation = layersOut, 1, 0.15, linear, fade
    animation = fadeLayersIn, 1, 0.15, almostLinear
    animation = fadeLayersOut, 1, 0.15, almostLinear
    animation = workspaces, 1, 0.2, almostLinear, fade
    animation = workspacesIn, 1, 0.15, almostLinear, fade
    animation = workspacesOut, 1, 0.2, almostLinear, fade
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to -1 to disable the default wallpapers completely
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

group {
    col.border_active = $blueAlphae6
    col.border_inactive = $surface0Alphae6

    groupbar {
        enabled = true
        font_size = 10
        height = 16
        gradients = true
        render_titles = true
        text_offset = 0

        # Styling options
        rounding = 3
        indicator_height = 3
        indicator_gap = 2

        # Spacing
        gaps_in = 2
        gaps_out = 4


        col.active = $overlay0Alphae6
        col.inactive = $surface0Alphae6
        text_color = $text
    }
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    accel_profile = flat

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    repeat_delay = 250
    repeat_rate = 40
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# Gestures configuration - these options have been deprecated in newer Hyprland versions
# gestures {
#     workspace_swipe = true
# }

# Source additional configurations
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/window-rules.conf
source = ~/.config/hypr/autostart.conf

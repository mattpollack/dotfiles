# Autostart Configuration for Hyprland

# Import systemd environment to fix input device access on first login
exec-once = systemctl --user import-environment XDG_SESSION_TYPE XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Wallpaper and shell (noctalia-shell manages wallpapers)
exec-once = noctalia-shell

# Authentication agent
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1  # Disabled: FHS path doesn't exist on NixOS

# Notification daemon (mako)
exec-once = mako

# Clipboard manager (optional)
# exec-once = wl-paste --watch cliphist store

# Idle management (optional - uncomment if you want it)
# exec-once = hypridle

# Bar (using noctalia-shell's built-in bar or waybar)
# If using waybar instead of noctalia:
# exec-once = waybar

# Network manager applet (optional)
# exec-once = nm-applet --indicator

# Bluetooth manager (optional)
# exec-once = blueman-applet
